<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Co-Op Hub Store</title>
  <style>
    body {
      font-family: Arial;
      background: #0e0e0e;
      color: white;
      margin: 0;
    }

    header {
      text-align: center;
      padding: 30px;
      background: #181818;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1f1f1f;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    a {
      display: block;
      margin-top: 10px;
      padding: 10px;
      background: #00c853;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    a:hover {
      background: #00e676;
    }
  </style>
</head>

<body>

<header>
  <h1>🎮 Co-Op Hub Store</h1>
  <p>Games • Tools • Scripts • Optimization</p>
</header>

<div class="grid">

  <div class="card">
    <h2>🎮 Games</h2>
    <a href="games.html">Enter</a>
  </div>

  <div class="card">
    <h2>⚙️ Programs</h2>
    <a href="programs.html">Enter</a>
  </div>

  <div class="card">
    <h2>🧩 Nucleus Co-Op</h2>
    <a href="nucleus.html">Enter</a>
  </div>

  <div class="card">
    <h2>🖥️ OS & Optimization</h2>
    <a href="os.html">Enter</a>
  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Local Co-Op Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      background: #181818;
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    p {
      color: #aaa;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      padding: 30px;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .card h2 {
      margin-top: 0;
      color: #00e676;
      font-size: 20px;
    }

    a {
      display: block;
      margin-top: 10px;
      padding: 10px;
      background: #00c853;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    a:hover {
      background: #00e676;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #666;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  <h1>🎮 Local Co-Op Hub</h1>
  <p>Games • Tools • Scripts • Optimization</p>
</header>

<div class="container">

  <div class="card">
    <h2>🎮 Games</h2>
    <a href="#">Enter</a>
  </div>

  <div class="card">
    <h2>⚙️ Programs</h2>
    <a href="#">Enter</a>
  </div>

  <div class="card">
    <h2>🧩 Nucleus Co-Op</h2>
    <a href="#">Enter</a>
  </div>

  <div class="card">
    <h2>🖥️ OS & Optimization</h2>
    <a href="#">Enter</a>
  </div>

</div>

<footer>
  Local Co-Op Hub • GitHub Pages System
</footer>

</body>
</html>
